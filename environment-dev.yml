# ResearchPulse — development / packaging environment
#
# Includes runtime deps plus Flask (optional web UI), build, and twine.
#
# Create and activate:
#   micromamba create -y -f environment-dev.yml
#   micromamba activate research-pulse-dev
#
# Then:
#   pip install -e ".[all]"
#
# Build a release wheel (from repo root):
#   python -m build
#   twine check dist/*

name: research-pulse-dev
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - requests>=2.31.0
  - feedparser>=6.0.11
  - pyyaml>=6.0.1
  - jinja2>=3.1.3
  - python-dateutil>=2.9.0
  - rich>=13.0
  - flask>=2.0
  - pytest>=7.4
  - pytest-cov>=4.1
  - pip:
      - build>=1.0.0
      - twine>=4.0.0
